name: Feature request
description: Propose a format change, API addition, or new benchmark
labels: [enhancement]
body:
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Measurement or evidence
      description: >
        For format/efficiency proposals: token measurements (e.g. `haal stats`
        output or a benchmark-harness run) supporting the change. Claims without
        measurements are welcome as discussions but won't change defaults.
